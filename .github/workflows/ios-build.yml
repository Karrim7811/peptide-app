name: iOS Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate App Icon
        run: |
          # Create a 1024x1024 app icon with brand colors using sips
          ICON_DIR=ios-native/PeptideCortex/Resources/Assets.xcassets/AppIcon.appiconset
          # Use Python to generate a simple branded icon
          python3 << 'PYEOF'
          import struct, zlib, os

          def create_png(width, height, filename):
              # Create a simple teal-to-dark gradient icon with "Cx" text area
              def pixel(x, y):
                  # Background gradient from teal (#1A8A9E) to dark (#1A1915)
                  t = y / height
                  r = int(26 * (1 - t) + 26 * t)
                  g = int(138 * (1 - t) + 25 * t)
                  b = int(158 * (1 - t) + 21 * t)

                  # Draw a centered "Cx" area - lighter rectangle
                  cx, cy = width // 2, height // 2
                  hw, hh = width // 4, height // 4
                  if abs(x - cx) < hw and abs(y - cy) < hh:
                      r = min(255, r + 40)
                      g = min(255, g + 40)
                      b = min(255, b + 40)

                  return bytes([r, g, b, 255])

              raw = b''
              for y in range(height):
                  raw += b'\x00'  # filter byte
                  for x in range(width):
                      raw += pixel(x, y)

              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)

              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = struct.pack('>IIBBBBB', width, height, 8, 6, 0, 0, 0)
              idat = zlib.compress(raw)

              with open(filename, 'wb') as f:
                  f.write(sig)
                  f.write(chunk(b'IHDR', ihdr))
                  f.write(chunk(b'IDAT', idat))
                  f.write(chunk(b'IEND', b''))

          create_png(1024, 1024, os.environ.get('ICON_PATH', 'icon.png'))
          PYEOF
          ICON_PATH="$ICON_DIR/AppIcon.png" python3 -c "
          import struct, zlib, os
          w = h = 1024
          raw = b''
          for y in range(h):
              raw += b'\x00'
              for x in range(w):
                  t = y / h
                  r = int(26 * (1-t) + 26 * t)
                  g = int(138 * (1-t) + 25 * t)
                  b = int(158 * (1-t) + 21 * t)
                  raw += bytes([r, g, b, 255])
          def chunk(ct, d):
              c = ct + d
              return struct.pack('>I', len(d)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
          sig = b'\x89PNG\r\n\x1a\n'
          ihdr = struct.pack('>IIBBBBB', w, h, 8, 6, 0, 0, 0)
          with open('$ICON_DIR/AppIcon.png', 'wb') as f:
              f.write(sig + chunk(b'IHDR', ihdr) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b''))
          print('Icon generated')
          "

          # Update Contents.json to reference the icon
          cat > "$ICON_DIR/Contents.json" << 'ICONJSON'
          {
            "images" : [
              {
                "filename" : "AppIcon.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          ICONJSON

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          cd ios-native
          # Set provisioning profile name (will be overridden by signing step)
          export PROVISIONING_PROFILE_NAME="temp"
          xcodegen generate
          echo "Xcode project generated successfully"

      - name: Import Distribution Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          CERTIFICATE_PATH=$RUNNER_TEMP/distribution.p12

          echo "$CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH

          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Import Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/PeptideCortex.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV

      - name: Configure signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios-native
          # Re-generate with correct provisioning profile
          export DEVELOPMENT_TEAM=$APPLE_TEAM_ID
          export PROVISIONING_PROFILE_NAME=$PROFILE_UUID
          export GITHUB_RUN_NUMBER=${{ github.run_number }}
          xcodegen generate
          echo "Project regenerated with signing: Team=$APPLE_TEAM_ID Profile=$PROFILE_UUID"

      - name: Resolve Swift packages
        run: |
          cd ios-native
          xcodebuild -resolvePackageDependencies \
            -project PeptideCortex.xcodeproj \
            -scheme PeptideCortex

      - name: Configure app target signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios-native
          # Use ruby/xcodeproj to set signing only on the app target, not SPM deps
          gem install xcodeproj
          ruby <<'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('PeptideCortex.xcodeproj')
          project.targets.each do |target|
            if target.name == 'PeptideCortex'
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
                config.build_settings['DEVELOPMENT_TEAM'] = ENV['APPLE_TEAM_ID']
                config.build_settings['CODE_SIGN_IDENTITY'] = 'iPhone Distribution'
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ENV['PROFILE_UUID']
              end
            end
          end
          project.save
          RUBY
          echo "Signing configured for PeptideCortex target only"

      - name: Build iOS Archive
        run: |
          cd ios-native
          xcodebuild \
            -project PeptideCortex.xcodeproj \
            -scheme PeptideCortex \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/PeptideCortex.xcarchive \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            archive

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ai.peptidecortex.app</key>
              <string>$PROFILE_UUID</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/PeptideCortex.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 --decode -o $RUNNER_TEMP/AuthKey.p8

          mkdir -p ~/private_keys
          cp $RUNNER_TEMP/AuthKey.p8 ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          echo "IPA file:"
          ls -la $RUNNER_TEMP/ipa/

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/PeptideCortex.ipa" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --apiKeyPath ~/private_keys \
            --verbose

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
