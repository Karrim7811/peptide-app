name: PeptideCortex
options:
  bundleIdPrefix: ai.peptidecortex
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "${GITHUB_RUN_NUMBER}"
    DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "iPhone Distribution"
    PROVISIONING_PROFILE_SPECIFIER: "${PROVISIONING_PROFILE_NAME}"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

targets:
  PeptideCortex:
    type: application
    platform: iOS
    sources:
      - path: PeptideCortex
    resources:
      - path: PeptideCortex/Resources
    settings:
      base:
        INFOPLIST_FILE: PeptideCortex/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: ai.peptidecortex.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: PeptideCortex/Resources/PeptideCortex.entitlements
